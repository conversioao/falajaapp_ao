<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            neon: '#ccff00', // The vibrant lime color from the reference
            'neon-hover': '#b3e600',
            dark: '#050505', // Deepest black
            'card-dark': '#121212', // Slightly lighter for cards
            'input-dark': '#1a1a1a',
          },
          boxShadow: {
            'neon': '0 0 20px rgba(204, 255, 0, 0.4)', // Keeping definition but removing usage on buttons as requested
            'neon-sm': '0 0 10px rgba(204, 255, 0, 0.3)',
          },
          animation: {
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'fade-in': 'fadeIn 0.6s ease-out forwards',
            'glow': 'glow 2s ease-in-out infinite alternate',
            'spin-slow': 'spin 8s linear infinite',
            'spin-reverse': 'spin 12s linear infinite reverse',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-15px)' },
            },
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            glow: {
              'from': { boxShadow: '0 0 10px -5px rgba(204, 255, 0, 0.1)' },
              'to': { boxShadow: '0 0 20px 0px rgba(204, 255, 0, 0.4)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    html,
    body {
      overflow-x: hidden;
      width: 100%;
    }

    body {
      background-color: #050505;
      color: #f8fafc;
      -webkit-font-smoothing: antialiased;
    }

    .glass {
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-hover:hover {
      background: rgba(30, 30, 30, 0.8);
      border-color: rgba(204, 255, 0, 0.3);
      transform: translateY(-2px);
      transition: all 0.3s ease;
    }

    .text-gradient {
      background: linear-gradient(to right, #ccff00, #ffffff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bg-gradient-neon {
      background: linear-gradient(135deg, #ccff00 0%, #a3cc00 100%);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ccff00;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Input autofill fix for dark theme */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #1a1a1a inset !important;
      -webkit-text-fill-color: white !important;
    }

    /* Audio Ring Gradient Animation */
    .audio-ring-gradient {
      background: conic-gradient(from 0deg, #ccff00, #3b82f6, #a855f7, #f97316, #ccff00);
    }
  </style>
