    html,

      width: 100%;

    body {

      color: #f8fafc;

    .glass {
      background: rgba(20, 20, 20, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .glass-hover:hover {
      background: rgba(30, 30, 30, 0.8);
      border-color: rgba(204, 255, 0, 0.3);
      transform: translateY(-2px);
      transition: all 0.3s ease;
    }

    .text-gradient {
      background: linear-gradient(to right, #ccff00, #ffffff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .bg-gradient-neon {
      background: linear-gradient(135deg, #ccff00 0%, #a3cc00 100%);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #050505;
    }

    ::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #ccff00;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    /* Input autofill fix for dark theme */
    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus,
    input:-webkit-autofill:active {
      -webkit-box-shadow: 0 0 0 30px #1a1a1a inset !important;
      -webkit-text-fill-color: white !important;
    }

    /* Audio Ring Gradient Animation */
    .audio-ring-gradient {
      background: conic-gradient(from 0deg, #ccff00, #3b82f6, #a855f7, #f97316, #ccff00);
    }
